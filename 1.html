<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated 3D Saturn Particle System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        /* Modern Glassmorphism UI */
        #ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ddd;
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 10;
            color: #ffaa00;
            font-size: 0.9rem;
        }
    </style>

    <!-- Three.js + Post Processing Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="status">Automatic Mode: 10s Expand / 10s Compress</div>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Saturn Geometry</h1>
        <div class="color-picker-wrapper">
            <span>Particle Color:</span>
            <!-- Default set to Golden Orange -->
            <input type="color" id="colorPicker" value="#ffaa00">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. GLOBALS & SETTINGS ---
        const NUM_PARTICLES = 15000;
        let targetScale = 1.0;
        let currentScale = 1.0;
        
        const container = document.getElementById('canvas-container');
        const colorPicker = document.getElementById('colorPicker');
        
        // --- 2. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        // Post-Processing (Bloom for glowing particles)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 3. PARTICLE SYSTEM GENERATION ---
        // Create a circular texture for smooth particles
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 32, 32);
        const particleTexture = new THREE.CanvasTexture(canvas);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(NUM_PARTICLES * 3);

        const material = new THREE.PointsMaterial({
            size: 0.8,
            color: new THREE.Color(colorPicker.value),
            map: particleTexture,
            transparent: true,
            opacity: 0.8,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        // --- 4. SATURN MATHEMATICS ---
        for (let i = 0; i < NUM_PARTICLES; i++) {
            const idx = i * 3;
            let x = 0, y = 0, z = 0;
            
            // Random noise for volume
            const nx = (Math.random() - 0.5) * 1.5;
            const ny = (Math.random() - 0.5) * 1.5;
            const nz = (Math.random() - 0.5) * 1.5;

            if (i < NUM_PARTICLES * 0.4) {
                // Planet Body
                const u = Math.random(), v = Math.random();
                const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
                const r = Math.cbrt(Math.random()) * 12;
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.cos(phi);
                z = r * Math.sin(phi) * Math.sin(theta);
            } else {
                // Rings
                const angle = Math.random() * Math.PI * 2;
                const r = 16 + Math.random() * 14;
                x = r * Math.cos(angle);
                y = (Math.random() - 0.5) * 1.5; // Flat ring
                z = r * Math.sin(angle);
            }
            
            // Tilt Saturn smoothly
            const tempY = y * Math.cos(0.4) - z * Math.sin(0.4);
            const tempZ = y * Math.sin(0.4) + z * Math.cos(0.4);
            y = tempY; z = tempZ;

            positions[idx] = x + nx;
            positions[idx + 1] = y + ny;
            positions[idx + 2] = z + nz;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // UI Event Listener for Color Picker
        colorPicker.addEventListener('input', (e) => {
            material.color.set(e.target.value);
        });

        // --- 5. ANIMATION LOOP & AUTOMATION ---
        const clock = new THREE.Clock();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // 1. Calculate automated scale
            // Math.sin(time * Math.PI / 10) completes a full wave (-1 to 1) every 20 seconds.
            // 10 seconds of expansion, 10 seconds of mild compression.
            // Map the sine wave (-1 to 1) to a scale range of 0.8 (min compress) to 2.2 (max expand)
            const minScale = 0.8;
            const maxScale = 2.2;
            const midPoint = (maxScale + minScale) / 2;     // 1.5
            const amplitude = (maxScale - minScale) / 2;    // 0.7
            
            targetScale = midPoint + Math.sin(time * Math.PI / 10) * amplitude;

            // 2. Smoothly apply scale
            currentScale += (targetScale - currentScale) * 0.1;
            particleSystem.scale.set(currentScale, currentScale, currentScale);

            // 3. Add extra rotation speed based on scale (larger scale = slightly faster rotation)
            controls.autoRotateSpeed = currentScale * 1.5;
            controls.update();

            // Render via post-processing
            composer.render();
        }

        animate();

    </script>
</body>
</html>
